<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<title>Mis Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --bg2: #141414;
  --card: #1a1a1a;
  --card2: #202020;
  --border: #2a2a2a;
  --border2: #333333;
  --text: #f0f0f0;
  --muted: #909090;
  --muted2: #b0b0b0;
  --accent: #e8ff47;
  --accent-dim: #e8ff4720;
  --accent2: #ff6b35;
  --green: #00d68f;
  --green-dim: #00d68f18;
  --blue: #4d9fff;
  --blue-dim: #4d9fff18;
  --red: #ff4d6a;
  --radius: 20px;
  --radius-sm: 12px;
  --shadow: 0 1px 8px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: 90px;
}

/* HEADER */
.header {
  padding: 52px 22px 0;
  background: var(--bg);
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.5px;
}

.logo span { color: var(--accent); }

.month-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 7px 14px;
  cursor: pointer;
}

.month-btn-text {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--muted2);
  font-weight: 500;
  text-transform: capitalize;
}

.month-btn-arrow { color: var(--muted); font-size: 10px; }

/* HERO */
.hero {
  margin: 0 22px 6px;
  background: var(--card);
  border-radius: 24px;
  padding: 24px 22px 20px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(232,255,71,0.08) 0%, transparent 65%);
  pointer-events: none;
}

.hero-eyebrow {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 10px;
}

.hero-amount {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 46px;
  color: var(--text);
  line-height: 1;
  letter-spacing: -2px;
  margin-bottom: 20px;
}

.hero-amount-sign {
  font-size: 22px;
  color: var(--muted2);
  font-weight: 400;
  letter-spacing: 0;
}

.hero-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 16px;
}

.hero-stats { display: flex; gap: 0; }

.hero-stat {
  flex: 1;
  padding: 0 4px;
  border-right: 1px solid var(--border);
  text-align: center;
}

.hero-stat:last-child { border-right: none; }
.hero-stat:first-child { text-align: left; padding-left: 0; }
.hero-stat:last-child { text-align: right; padding-right: 0; }

.hero-stat-val {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: var(--text);
  display: block;
  margin-bottom: 3px;
  letter-spacing: -0.5px;
}

.hero-stat-val.hi { color: var(--accent); }

.hero-stat-label {
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* NAV */
.nav-scroll {
  display: flex;
  gap: 6px;
  padding: 14px 22px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-scroll::-webkit-scrollbar { display: none; }

.nav-pill {
  white-space: nowrap;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted2);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: all 0.18s;
}

.nav-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0d0d0d;
}

/* CONTENT */
.content { padding: 18px 22px 0; }

.section-label {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 12px;
}

/* GASTO CARD */
.gasto-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--border);
  transition: transform 0.12s;
}
.gasto-card:active { transform: scale(0.98); }

.gasto-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  background: var(--card2);
  overflow: hidden;
}

.gasto-info { flex: 1; min-width: 0; }

.gasto-rubro {
  font-size: 14px;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 3px;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.gasto-detalle {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.1px;
}

.gasto-right { text-align: right; flex-shrink: 0; }

.gasto-monto {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 3px;
}

.gasto-fecha { font-size: 10px; color: var(--muted); font-weight: 500; }

.gasto-tipo {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 4px;
  display: inline-block;
  font-weight: 700;
  letter-spacing: 0.3px;
}

.tipo-contado { background: var(--green-dim); color: var(--green); }
.tipo-cuota { background: rgba(255,107,53,0.15); color: var(--accent2); }
.tipo-fijo { background: var(--blue-dim); color: var(--blue); }

/* RANKING */
.ranking-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}

.ranking-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.ranking-left { display: flex; align-items: center; gap: 12px; }

.ranking-pos {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 26px;
  color: var(--border2);
  width: 28px;
  line-height: 1;
  letter-spacing: -1px;
}

.ranking-pos.p1 { color: #e8c84a; }
.ranking-pos.p2 { color: #9ea8b0; }
.ranking-pos.p3 { color: #c4834a; }

.ranking-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
}

.ranking-pct {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

.ranking-amount {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--text);
  letter-spacing: -0.5px;
}

.bar-bg {
  height: 4px;
  background: var(--card2);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
}

/* CUOTA */
.cuota-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}

.cuota-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.cuota-nombre {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
  margin-bottom: 3px;
}

.cuota-sub { font-size: 11px; color: var(--muted); font-weight: 500; }

.cuota-monto {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--accent);
  letter-spacing: -0.5px;
  text-align: right;
}

.cuota-monto-label { font-size: 10px; color: var(--muted); text-align: right; }

.cuota-prog-bg {
  height: 5px;
  background: var(--card2);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}

.cuota-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #b8cc30);
  border-radius: 3px;
}

.cuota-foot {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}

/* COMPARAR */
.comp-totals { display: flex; gap: 8px; margin-bottom: 16px; }

.comp-card {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
}

.comp-card.act { border-color: var(--accent); }

.comp-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 4px;
  text-transform: capitalize;
  letter-spacing: 0.2px;
}

.comp-label.act { color: var(--accent); }

.comp-total {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.5px;
}

.comp-item {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}

.comp-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.comp-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.comp-bar-tag { font-size: 10px; font-weight: 700; width: 16px; }
.comp-bar-tag.a { color: var(--accent); }
.comp-bar-tag.b { color: var(--blue); }
.comp-bar-bg { flex: 1; height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
.comp-bar-fill { height: 100%; border-radius: 3px; }
.fill-a { background: var(--accent); }
.fill-b { background: var(--blue); }
.comp-bar-val { font-size: 11px; color: var(--muted2); width: 72px; text-align: right; font-weight: 500; }

/* FIJOS */
.fijo-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--border);
}

.fijo-nombre {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
  margin-bottom: 2px;
}

.fijo-rubro { font-size: 11px; color: var(--muted); font-weight: 500; }

.fijo-monto {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--green);
  letter-spacing: -0.5px;
}

/* FAB */
.fab {
  position: fixed;
  bottom: 100px; right: 20px;
  width: 56px; height: 56px;
  background: var(--accent);
  border-radius: 50%;
  border: none;
  font-size: 28px;
  color: #0d0d0d;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(232,255,71,0.35);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
  z-index: 50;
  line-height: 1;
}
.fab:active { transform: scale(0.9); }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(13,13,13,0.95);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 0 20px;
  backdrop-filter: blur(20px);
  z-index: 100;
}

.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px; cursor: pointer; padding: 4px 0;
}

.nav-item-icon { font-size: 20px; transition: transform 0.2s; }
.nav-item-label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.3px; }
.nav-item.active .nav-item-icon { transform: scale(1.15); }
.nav-item.active .nav-item-label { color: var(--accent); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(6px);
}

#modalEditar { z-index: 300; }

.modal {
  background: var(--bg2);
  border-radius: 24px 24px 0 0;
  padding: 18px 22px 40px;
  width: 100%; max-width: 430px;
  margin: 0 auto;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  max-height: 92vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-bottom: none;
  position: relative;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-overlay.open .modal { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.modal-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  position: sticky;
  top: -18px;
  background: var(--bg2);
  padding: 18px 0 12px;
  margin-top: -18px;
  z-index: 10;
  border-bottom: 1px solid var(--border);
}

.modal-top .modal-title { margin-bottom: 0; }

.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card2);
  color: var(--muted2);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  line-height: 1;
}

.modal-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 20px;
}

/* FORM */
.form-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
  display: block;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px 16px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 500;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--accent); }
.form-row { display: flex; gap: 10px; }
.form-row .form-input { flex: 1; }

/* TIPO */
.tipo-toggle { display: flex; gap: 6px; margin-bottom: 16px; }

.tipo-btn {
  flex: 1; padding: 11px 6px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted2);
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; text-align: center;
  letter-spacing: 0.2px;
}

.tipo-btn.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}

/* CHIPS */
.chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }

.chip {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted2);
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.18s;
}

.chip.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 600;
}

/* BTNS */
.btn-primary {
  width: 100%; padding: 15px;
  background: var(--accent);
  border: none; border-radius: var(--radius-sm);
  color: #0d0d0d;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: opacity 0.2s;
  letter-spacing: 0.2px;
}

.btn-primary:active { opacity: 0.85; }

.btn-secondary {
  width: 100%; padding: 13px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted2);
  font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer; margin-top: 8px;
}

/* CONFIG */
.config-rubro {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 7px;
  display: flex; align-items: center; justify-content: space-between;
}

.config-rubro-left { display: flex; align-items: center; gap: 10px; }
.config-rubro-emoji { font-size: 18px; }
.config-rubro-name { font-size: 14px; font-weight: 600; color: var(--text); }
.config-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.config-btn.delete { color: var(--red); border-color: rgba(255,77,106,0.25); }
.add-rubro-row { display: flex; gap: 7px; margin-top: 8px; }
.add-rubro-row .form-input { margin-bottom: 0; }

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-text { font-size: 14px; font-weight: 500; }

/* TOAST */
.toast {
  position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
  background: var(--card2); color: var(--text);
  border: 1px solid var(--border2);
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  z-index: 300; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  letter-spacing: 0.2px;
}
.toast.show { opacity: 1; }

.cuota-calc { font-size: 13px; color: var(--accent); font-weight: 700; margin-top: -10px; margin-bottom: 16px; }

.loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; font-weight: 500; }

.config-section { margin-bottom: 22px; }

input[type="date"] { color-scheme: dark; }
input[type="number"] { -moz-appearance: textfield; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="logo">mis<span>finanzas</span> <span style="font-size:11px;font-weight:400;color:var(--muted);letter-spacing:0">v1.0</span></div>
    <div class="month-btn" onclick="document.getElementById('mesSelectorQuick').value=mesKey(mesActual);openModal('modalMes')">
      <span class="month-btn-text" id="monthBadge">cargando...</span>
      <span class="month-btn-arrow">▾</span>
    </div>
  </div>
</div>

<div class="hero">
  <div class="hero-eyebrow">Total del mes</div>
  <div class="hero-amount"><span class="hero-amount-sign">$</span><span id="totalMes">0</span></div>
  <div id="heroUsd" style="display:none;font-size:13px;color:var(--muted2);margin-bottom:14px;font-weight:500;letter-spacing:0.2px"></div>
  <div class="hero-divider"></div>
  <div class="hero-stats">
    <div class="hero-stat">
      <span class="hero-stat-val hi" id="totalHoy">$0</span>
      <span class="hero-stat-label">Hoy</span>
    </div>
    <div class="hero-stat">
      <span class="hero-stat-val" id="totalCuotas">$0</span>
      <span class="hero-stat-label">Cuotas</span>
    </div>
    <div class="hero-stat">
      <span class="hero-stat-val" id="cantGastos">0</span>
      <span class="hero-stat-label">Gastos</span>
    </div>
  </div>
</div>

<div class="nav-scroll">
  <button class="nav-pill active" onclick="switchView('gastos',this)">📋 Gastos</button>
  <button class="nav-pill" onclick="switchView('ranking',this)">🏆 Ranking</button>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaBMeT6nULilPnIl0aaHykvx_pkcDnN6iyrPY6qQkRpxTmjcJ6jaSddtUqQ3YWRzvO/exec';

let gastos=[], cuotasActivas=[], gastosFijos=[], rubros=[];
let currentView='gastos', tipoGasto='contado';
let rubroSeleccionado=null, subRubroSeleccionado=null;
let mesActual=new Date();
let mesComparar1=new Date();
let mesComparar2=new Date(new Date().setMonth(new Date().getMonth()-1));
let tipoCambio={}; // {  '2026-03': 1300, '2026-02': 1200, ... }

const RUBROS_DEFAULT=[
  {nombre:'🏠 Hogar',color:'#e8ff47',subs:['Alquiler','Expensas','Luz','Gas','Agua','Internet','Supermercado']},
  {nombre:'👤 Personales',color:'#e8ff47',subs:['Ropa','Salud','Gimnasio','Higiene','Ocio']},
  {nombre:'🐜 Hormiga',color:'#e8ff47',subs:['Café','Transporte','Kiosco','Delivery']},
  {nombre:'🐾 Mascotas',color:'#e8ff47',subs:['Alimento','Baño','Veterinaria','Accesorios']},
  {nombre:'👨‍👩‍👧 Hijos',color:'#e8ff47',subs:['Colegio','Club','Útiles','Actividades']},
  {nombre:'💳 Deudas',color:'#e8ff47',subs:['Tarjeta','Crédito personal','Cuotas']},
  {nombre:'📦 Otros',color:'#e8ff47',subs:[]},
];

function loadRubros(data){
  if(data&&data['Rubros']&&data['Rubros'].length>0){
    rubros=data['Rubros'].map(r=>({nombre:String(r[0]||'').trim(),color:'#e8ff47',subs:r[1]?String(r[1]).split(',').map(s=>s.trim()).filter(s=>s):[]})).filter(r=>r.nombre);
  } else {
    const saved=localStorage.getItem('rubros_finanzas');
    rubros=saved?JSON.parse(saved):RUBROS_DEFAULT;
  }
}

function saveRubros(){localStorage.setItem('rubros_finanzas',JSON.stringify(rubros));}
function fmt(n){return Number(n).toLocaleString('es-AR');}
function fmtMes(d){return d.toLocaleDateString('es-AR',{month:'long',year:'numeric'});}
function mesKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function today(){return new Date().toISOString().slice(0,10);}
function fechaToMesKey(f){
  if(!f) return '';
  if(f.toString().includes('/')){const p=f.split('/');return `${p[2]}-${p[1].padStart(2,'0')}`;}
  return f.slice(0,7);
}

async function scriptPost(data){
  const r=await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data),redirect:'follow'});
  const text=await r.text();
  try{return JSON.parse(text);}catch(e){return{ok:true};}
}

async function loadData(){
  // Mostrar datos cacheados al instante mientras refresca
  const cached = localStorage.getItem('finanzas_cache');
  if(cached){
    try{
      const d=JSON.parse(cached);
      procesarData(d);
      updateHeader(); renderView();
    }catch(e){}
  }
  try{
    const r=await fetch(APPS_SCRIPT_URL+'?accion=leer',{redirect:'follow'});
    const text=await r.text();
    let data;
    try{data=JSON.parse(text);}catch(pe){
      console.error('Respuesta no-JSON:',text.slice(0,300));
      if(!cached) throw new Error('Apps Script no devolvió JSON. Verificá que esté publicado como "Cualquiera (sin iniciar sesión)".');
      return; // Si hay cache, no mostrar error
    }
    if(data.error) throw new Error(data.error);
    localStorage.setItem('finanzas_cache', JSON.stringify(data));
    procesarData(data);
    // Detectar si la hoja tiene columna ID mirando el encabezado
  }catch(e){
    if(!localStorage.getItem('finanzas_cache')){
      document.getElementById('mainContent').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message||'Error al cargar datos.'}<br><br><small style="color:var(--muted);font-size:11px">Revisá la consola (F12) para más detalles</small></div></div>`;
    }
    console.error('loadData error:',e);
  }
}

function procesarData(data){
    const header=(data['GastosHeader']||[]);
    const hasId = header.length>0 && String(header[0]).toUpperCase()==='ID';
    const o = hasId ? 1 : 0;
    gastos=(data['Gastos']||[]).map((r,i)=>({
      id: hasId ? (r[0]||null) : null,
      idx: i,
      fecha: r[o]||'', mes: r[o+1]||'', rubro: r[o+2]||'',
      subrubro: r[o+3]||'', detalle: r[o+4]||'',
      monto: parseFloat(r[o+5])||0, tipo: r[o+6]||'Contado'
    }));
    cuotasActivas=(data['Cuotas Activas']||[]).map(r=>({fecha:r[0]||'',rubro:r[1]||'',detalle:r[2]||'',montoCuota:parseFloat(r[3])||0,totalCuotas:parseInt(r[4])||0,cuotaActual:parseInt(r[5])||1,totalGasto:parseFloat(r[6])||0}));
    gastosFijos=(data['Gastos Fijos']||[]).map(r=>({nombre:r[0]||'',rubro:r[1]||'',monto:parseFloat(r[2])||0,activo:r[3]!=='false'}));
    loadRubros(data);
    // Cargar tipo de cambio
    tipoCambio={};
    (data['TipoCambio']||[]).forEach(r=>{ if(r[0]&&r[1]) tipoCambio[String(r[0]).trim()]=parseFloat(r[1])||0; });
    updateHeader();
    renderView();
}

function gastosDelMes(d){const mk=mesKey(d);return gastos.filter(g=>fechaToMesKey(g.fecha)===mk||g.mes===mk);}

function updateHeader(){
  document.getElementById('monthBadge').textContent=fmtMes(mesActual);
  const gm=gastosDelMes(mesActual);
  const total=gm.reduce((s,g)=>s+g.monto,0);
  const hoy=today();
  const totalH=gm.filter(g=>g.fecha===hoy).reduce((s,g)=>s+g.monto,0);
  const totalC=gm.filter(g=>g.tipo&&g.tipo.startsWith('Cuota')).reduce((s,g)=>s+g.monto,0);
  document.getElementById('totalMes').textContent=fmt(total);
  document.getElementById('totalHoy').textContent='$'+fmt(totalH);
  document.getElementById('totalCuotas').textContent='$'+fmt(totalC);
  document.getElementById('cantGastos').textContent=gm.length;
  // USD en hero
  const mk=mesKey(mesActual);
  const tc=tipoCambio[mk];
  const heroUsd=document.getElementById('heroUsd');
  if(tc&&tc>0){
    const usd=(total/tc).toFixed(0);
    heroUsd.textContent='≈ USD '+Number(usd).toLocaleString('es-AR')+' (TC $'+fmt(tc)+')';
    heroUsd.style.display='block';
  } else {
    heroUsd.style.display='none';
  }
}

function switchView(v,btn){
  currentView=v;
  document.querySelectorAll('.nav-pill').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderView();
}

function switchTab(t){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='config') openConfig();
  else if(t==='buscar') openModal('modalBuscar');
  else{closeModal('modalConfig');closeModal('modalBuscar');}
}

function renderView(){
  const el=document.getElementById('mainContent');
  if(currentView==='gastos') renderGastos(el);
  else if(currentView==='ranking') renderRanking(el);
  else if(currentView==='cuotas') renderCuotas(el);
  else if(currentView==='comparar') renderComparar(el);
  else if(currentView==='fijos') renderFijos(el);
  else if(currentView==='usd') renderUSD(el);
}

function renderGastos(el){
  const mk=mesKey(mesActual);
  const tc=tipoCambio[mk]||0;
  const gm=gastosDelMes(mesActual).sort((a,b)=>{ const fd=b.fecha.localeCompare(a.fecha); if(fd!==0) return fd; const ta=a.id&&a.id.startsWith("GAS-")?parseInt(a.id.split("-")[1]||0):a.idx; const tb=b.id&&b.id.startsWith("GAS-")?parseInt(b.id.split("-")[1]||0):b.idx; return tb-ta; });
  if(!gm.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Sin gastos este mes</div></div>`;return;}
  el.innerHTML=`<div class="section-label">Gastos del mes</div>`+gm.map(g=>{
    const emojiMatch=g.rubro.match(/^\p{Emoji}/u);
    const emoji=emojiMatch?emojiMatch[0]:'💸';
    const rubroNombre=g.rubro.replace(/^\p{Emoji}\s*/u,'');
    const tipoClass=g.tipo&&g.tipo.startsWith('Cuota')?'tipo-cuota':g.tipo==='Fijo'?'tipo-fijo':'tipo-contado';
    const tipoLabel=g.tipo&&g.tipo.startsWith('Cuota')?g.tipo:g.tipo||'Contado';
    const usdStr=tc>0?`<div style="font-size:10px;color:var(--muted);font-weight:500;margin-top:2px">USD ${(g.monto/tc).toFixed(0)}</div>`:'';
    return `<div class="gasto-card" onclick="editarGasto(${gastos.indexOf(g)})" style="cursor:pointer">
      <div class="gasto-icon">${emoji}</div>
      <div class="gasto-info">
        <div class="gasto-rubro">${rubroNombre}${g.subrubro?' · '+g.subrubro:''}</div>
        ${g.detalle?`<div class="gasto-detalle">${g.detalle}</div>`:''}
      </div>
      <div class="gasto-right">
        <div class="gasto-monto">$${fmt(g.monto)}</div>
        ${usdStr}
        <div class="gasto-fecha">${g.fecha}</div>
        <div class="gasto-tipo ${tipoClass}">${tipoLabel}</div>
      </div>
    </div>`;
  }).join('');
}

function renderRanking(el){
  const gm=gastosDelMes(mesActual);
  const totales={};let total=0;
  gm.forEach(g=>{totales[g.rubro]=(totales[g.rubro]||0)+g.monto;total+=g.monto;});
  const sorted=Object.entries(totales).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🏆</div><div class="empty-text">Sin datos este mes</div></div>`;return;}
  const maxVal=sorted[0][1];
  const posC=['p1','p2','p3'];
  el.innerHTML=`<div class="section-label">Ranking del mes</div>`+sorted.map(([rubro,monto],i)=>{
    const pct=total>0?((monto/total)*100).toFixed(0):0;
    const bw=((monto/maxVal)*100).toFixed(0);
    return `<div class="ranking-card">
      <div class="ranking-row">
        <div class="ranking-left">
          <div class="ranking-pos ${posC[i]||''}">${i+1}</div>
          <div>
            <div class="ranking-name">${rubro}</div>
            <div class="ranking-pct">${pct}% del total</div>
          </div>
        </div>
        <div class="ranking-amount">$${fmt(monto)}</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${bw}%"></div></div>
    </div>`;
  }).join('');
}

function renderCuotas(el){
  if(!cuotasActivas.length){el.innerHTML=`<div class="empty"><div class="empty-icon">💳</div><div class="empty-text">Sin cuotas activas</div></div>`;return;}
  el.innerHTML=`<div class="section-label">Cuotas activas</div>`+cuotasActivas.map(c=>{
    const quedan=c.totalCuotas-c.cuotaActual+1;
    const pct=((c.cuotaActual-1)/c.totalCuotas)*100;
    return `<div class="cuota-card">
      <div class="cuota-top">
        <div>
          <div class="cuota-nombre">${c.detalle||c.rubro}</div>
          <div class="cuota-sub">${c.rubro}</div>
        </div>
        <div>
          <div class="cuota-monto">$${fmt(c.montoCuota)}</div>
          <div class="cuota-monto-label">por mes</div>
        </div>
      </div>
      <div class="cuota-prog-bg"><div class="cuota-prog-fill" style="width:${pct}%"></div></div>
      <div class="cuota-foot">
        <span>Cuota ${c.cuotaActual} de ${c.totalCuotas}</span>
        <span>Quedan ${quedan} · Total $${fmt(c.totalGasto)}</span>
      </div>
    </div>`;
  }).join('');
}

function renderComparar(el){
  const gm1=gastosDelMes(mesComparar1),gm2=gastosDelMes(mesComparar2);
  const total1=gm1.reduce((s,g)=>s+g.monto,0),total2=gm2.reduce((s,g)=>s+g.monto,0);
  const rubrosAll=[...new Set([...gm1.map(g=>g.rubro),...gm2.map(g=>g.rubro)])];
  const t1={},t2={};
  gm1.forEach(g=>t1[g.rubro]=(t1[g.rubro]||0)+g.monto);
  gm2.forEach(g=>t2[g.rubro]=(t2[g.rubro]||0)+g.monto);
  const maxVal=Math.max(...rubrosAll.map(r=>Math.max(t1[r]||0,t2[r]||0)),1);
  el.innerHTML=`
    <div class="section-label">Comparar meses</div>
    <div class="comp-totals">
      <div class="comp-card act">
        <div class="comp-label act">${fmtMes(mesComparar1)}</div>
        <div class="comp-total">$${fmt(total1)}</div>
      </div>
      <div class="comp-card">
        <div class="comp-label">${fmtMes(mesComparar2)}</div>
        <div class="comp-total">$${fmt(total2)}</div>
      </div>
    </div>
    ${rubrosAll.map(r=>{
      const v1=t1[r]||0,v2=t2[r]||0;
      const w1=(v1/maxVal*100).toFixed(0),w2=(v2/maxVal*100).toFixed(0);
      return `<div class="comp-item">
        <div class="comp-name">${r}</div>
        <div class="comp-bar-row"><div class="comp-bar-tag a">A</div><div class="comp-bar-bg"><div class="comp-bar-fill fill-a" style="width:${w1}%"></div></div><div class="comp-bar-val">$${fmt(v1)}</div></div>
        <div class="comp-bar-row"><div class="comp-bar-tag b">B</div><div class="comp-bar-bg"><div class="comp-bar-fill fill-b" style="width:${w2}%"></div></div><div class="comp-bar-val">$${fmt(v2)}</div></div>
      </div>`;
    }).join('')}`;
}

function renderFijos(el){
  if(!gastosFijos.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🔁</div><div class="empty-text">Sin gastos fijos</div></div>`;return;}
  const total=gastosFijos.filter(f=>f.activo).reduce((s,f)=>s+f.monto,0);
  el.innerHTML=`<div class="section-label">Fijos mensuales · $${fmt(total)}/mes</div>`+gastosFijos.map(f=>`<div class="fijo-card"><div><div class="fijo-nombre">${f.nombre}</div><div class="fijo-rubro">${f.rubro}</div></div><div class="fijo-monto">$${fmt(f.monto)}</div></div>`).join('');
}

function openModal(id){
  if(id==='modalNuevo'){
    document.getElementById('inputFecha').value=today();
    document.getElementById('inputMonto').value='';
    document.getElementById('inputCuotas').value='';
    document.getElementById('inputDetalle').value='';
    document.getElementById('cuotaCalc').textContent='';
    rubroSeleccionado=null;subRubroSeleccionado=null;
    setTipo('contado');renderChipsRubro();
  }
  document.getElementById(id).classList.add('open');
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

function setTipo(t){
  tipoGasto=t;
  ['contado','cuota','fijo'].forEach(x=>{document.getElementById('tipo'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===t);});
  document.getElementById('cuotasSection').style.display=t==='cuota'?'block':'none';
}

document.getElementById('inputMonto').addEventListener('input',calcCuota);
document.getElementById('inputCuotas').addEventListener('input',calcCuota);
function calcCuota(){
  if(tipoGasto!=='cuota') return;
  const m=parseFloat(document.getElementById('inputMonto').value);
  const c=parseInt(document.getElementById('inputCuotas').value);
  if(m&&c&&c>0) document.getElementById('cuotaCalc').textContent=`→ $${fmt(Math.round(m/c))} por cuota`;
}

function renderChipsRubro(){
  document.getElementById('chipsRubro').innerHTML=rubros.map(r=>`<button class="chip ${rubroSeleccionado===r.nombre?'active':''}" onclick="selectRubro('${r.nombre.replace(/'/g,"\\'")}')">${r.nombre}</button>`).join('');
  document.getElementById('subRubroSection').style.display='none';
}

function selectRubro(nombre){
  rubroSeleccionado=nombre;subRubroSeleccionado=null;
  document.querySelectorAll('#chipsRubro .chip').forEach(c=>c.classList.toggle('active',c.textContent.trim()===nombre));
  const r=rubros.find(x=>x.nombre===nombre);
  if(r&&r.subs&&r.subs.length){
    document.getElementById('subRubroSection').style.display='block';
    document.getElementById('chipsSubrubro').innerHTML=r.subs.map(s=>`<button class="chip" onclick="selectSub('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
  } else {document.getElementById('subRubroSection').style.display='none';}
}

function selectSub(s){
  subRubroSeleccionado=s;
  document.querySelectorAll('#chipsSubrubro .chip').forEach(c=>c.classList.toggle('active',c.textContent.trim()===s));
}

async function guardarGasto(){
  const monto=parseFloat(document.getElementById('inputMonto').value);
  if(!monto||monto<=0) return showToast('⚠️ Ingresá un monto válido');
  if(!rubroSeleccionado) return showToast('⚠️ Seleccioná un rubro');
  const detalle=document.getElementById('inputDetalle').value.trim();
  const fecha=document.getElementById('inputFecha').value;
  const mk=fecha.slice(0,7);

  if(tipoGasto==='cuota'){
    const cant=parseInt(document.getElementById('inputCuotas').value);
    if(!cant||cant<2) return showToast('⚠️ Mínimo 2 cuotas');
    const montoCuota=Math.round(monto/cant);
    const filas=[];
    for(let i=0;i<cant;i++){
      const d=new Date(fecha+'T12:00:00');
      d.setMonth(d.getMonth()+i);
      const f=d.toISOString().slice(0,10);
      const mk2=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      const id='GAS-'+Date.now()+'-'+i;
      filas.push([id,f,mk2,rubroSeleccionado,subRubroSeleccionado||'',detalle,montoCuota,'Cuota '+(i+1)+'/'+cant]);
    }
    const cuotaLocal={id:filas[0][0],idx:gastos.length,fecha,mes:mk,rubro:rubroSeleccionado,subrubro:subRubroSeleccionado||'',detalle,monto:montoCuota,tipo:'Cuota 1/'+cant};
    gastos.push(cuotaLocal);
    cuotasActivas.push({fecha,rubro:rubroSeleccionado,detalle,montoCuota,totalCuotas:cant,cuotaActual:1,totalGasto:monto});
    updateHeader(); renderView();
    closeModal('modalNuevo');
    showToast('✅ '+cant+' cuotas de $'+fmt(montoCuota));
    scriptPost({accion:'guardar',hoja:'Gastos',filas}).catch(()=>showToast('⚠️ Error al sincronizar'));
    scriptPost({accion:'guardar',hoja:'Cuotas Activas',filas:[[fecha,rubroSeleccionado,detalle,montoCuota,cant,1,monto,'']]});
  } else {
    const tipo=tipoGasto==='fijo'?'Fijo':'Contado';
    const id='GAS-'+Date.now();
    const gastoLocal={id,idx:gastos.length,fecha,mes:mk,rubro:rubroSeleccionado,subrubro:subRubroSeleccionado||'',detalle,monto,tipo};
    gastos.push(gastoLocal);
    if(tipoGasto==='fijo') gastosFijos.push({nombre:detalle||rubroSeleccionado,rubro:rubroSeleccionado,monto,activo:true});
    updateHeader(); renderView();
    closeModal('modalNuevo');
    showToast('✅ Gasto registrado');
    scriptPost({accion:'guardar',hoja:'Gastos',filas:[[id,fecha,mk,rubroSeleccionado,subRubroSeleccionado||'',detalle,monto,tipo]]})
      .catch(()=>showToast('⚠️ Error al sincronizar'));
    if(tipoGasto==='fijo')
      scriptPost({accion:'guardar',hoja:'Gastos Fijos',filas:[[detalle||rubroSeleccionado,rubroSeleccionado,monto,'true']]});
  }
}

function openConfig(){renderConfig();openModal('modalConfig');}

function renderConfig(){
  document.getElementById('configContent').innerHTML=`
    <div class="config-section">
      <div class="section-label">Rubros</div>
      ${rubros.map((r,i)=>`
        <div class="config-rubro">
          <div class="config-rubro-left">
            <div class="config-rubro-emoji">${r.nombre.split(' ')[0]}</div>
            <div class="config-rubro-name">${r.nombre.split(' ').slice(1).join(' ')}</div>
          </div>
          <button class="config-btn delete" onclick="eliminarRubro(${i})">🗑</button>
        </div>`).join('')}
      <div class="add-rubro-row">
        <input class="form-input" id="nuevoRubroEmoji" placeholder="🏷️" style="width:60px;text-align:center">
        <input class="form-input" id="nuevoRubroNombre" placeholder="Nombre">
        <button class="config-btn" onclick="agregarRubro()" style="width:40px;background:var(--accent);border-color:var(--accent);color:#0d0d0d;font-size:20px;font-weight:700">+</button>
      </div>
    </div>
    <div class="config-section">
      <div class="section-label">Mes a ver</div>
      <input class="form-input" type="month" id="mesSelector" value="${mesKey(mesActual)}" onchange="cambiarMes(this.value)">
    </div>
    <div class="config-section">
      <div class="section-label">Comparar meses</div>
      <div class="form-row">
        <input class="form-input" type="month" id="mes1Selector" value="${mesKey(mesComparar1)}" onchange="cambiarMesComparar(1,this.value)">
        <input class="form-input" type="month" id="mes2Selector" value="${mesKey(mesComparar2)}" onchange="cambiarMesComparar(2,this.value)">
      </div>
    </div>
    <div class="config-section">
      <div class="section-label">Tipo de cambio por mes</div>
      ${(()=>{
        const meses=[];
        for(let i=0;i<6;i++){const d=new Date(mesActual);d.setMonth(d.getMonth()-i);meses.push(mesKey(d));}
        return meses.map(mk=>{
          const tc=tipoCambio[mk]||'';
          const label=new Date(mk+'-15').toLocaleDateString('es-AR',{month:'short',year:'numeric'});
          return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-size:13px;color:var(--muted2);font-weight:500;width:80px;text-transform:capitalize">${label}</span>
            <input class="form-input" type="number" placeholder="TC" value="${tc}" id="tc-${mk}" style="margin-bottom:0;flex:1" inputmode="decimal">
            <button onclick="guardarTipoCambio('${mk}',parseFloat(document.getElementById('tc-${mk}').value))" style="background:var(--accent);border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;color:#0d0d0d;cursor:pointer">OK</button>
          </div>`;
        }).join('');
      })()}
    </div>`;
}

function agregarRubro(){
  const emoji=document.getElementById('nuevoRubroEmoji').value.trim()||'📌';
  const nombre=document.getElementById('nuevoRubroNombre').value.trim();
  if(!nombre) return showToast('⚠️ Ingresá un nombre');
  const nuevoRubro={nombre:`${emoji} ${nombre}`,color:'#e8ff47',subs:[]};
  rubros.push(nuevoRubro);
  saveRubros(); renderConfig(); showToast('✅ Rubro agregado');
  // Guardar en Sheets
  scriptPost({accion:'guardarRubros',rubros:rubros.map(r=>([r.nombre,(r.subs||[]).join(',')]))})
    .catch(()=>showToast('⚠️ Error al sincronizar rubro'));
}

function eliminarRubro(i){
  rubros.splice(i,1);
  saveRubros(); renderConfig(); showToast('🗑 Eliminado');
  scriptPost({accion:'guardarRubros',rubros:rubros.map(r=>([r.nombre,(r.subs||[]).join(',')]))})
    .catch(()=>showToast('⚠️ Error al sincronizar'));
}

function cambiarMes(v){mesActual=new Date(v+'-15');updateHeader();renderView();}
function cambiarMesQuick(v){mesActual=new Date(v+'-15');updateHeader();renderView();closeModal('modalMes');}

function renderUSD(el){
  const mk=mesKey(mesActual);
  const tc=tipoCambio[mk]||0;
  if(!tc){
    el.innerHTML=`<div class="empty"><div class="empty-icon">💵</div><div class="empty-text">No hay tipo de cambio cargado para este mes.<br><br>Cargalo en Configuración.</div></div>`;
    return;
  }
  const gm=gastosDelMes(mesActual).sort((a,b)=>{ const fd=b.fecha.localeCompare(a.fecha); if(fd!==0) return fd; const ta=a.id&&a.id.startsWith("GAS-")?parseInt(a.id.split("-")[1]||0):a.idx; const tb=b.id&&b.id.startsWith("GAS-")?parseInt(b.id.split("-")[1]||0):b.idx; return tb-ta; });
  const totalUSD=(gm.reduce((s,g)=>s+g.monto,0)/tc).toFixed(0);
  el.innerHTML=`
    <div class="section-label">Gastos en USD · TC $${fmt(tc)}</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px">Total del mes</span>
      <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:26px;color:var(--accent);letter-spacing:-1px">USD ${Number(totalUSD).toLocaleString('es-AR')}</span>
    </div>
    `+gm.map(g=>{
      const emojiMatch=g.rubro.match(/^\p{Emoji}/u);
      const emoji=emojiMatch?emojiMatch[0]:'💸';
      const rubroNombre=g.rubro.replace(/^\p{Emoji}\s*/u,'');
      const usd=(g.monto/tc).toFixed(0);
      return `<div class="gasto-card">
        <div class="gasto-icon">${emoji}</div>
        <div class="gasto-info">
          <div class="gasto-rubro">${rubroNombre}${g.subrubro?' · '+g.subrubro:''}</div>
          ${g.detalle?`<div class="gasto-detalle">${g.detalle}</div>`:''}
        </div>
        <div class="gasto-right">
          <div class="gasto-monto" style="color:var(--accent)">USD ${Number(usd).toLocaleString('es-AR')}</div>
          <div class="gasto-fecha">$${fmt(g.monto)}</div>
        </div>
      </div>`;
    }).join('');
}

async function guardarTipoCambio(mes, tc){
  if(!tc||tc<=0) return showToast('⚠️ Ingresá un TC válido');
  tipoCambio[mes]=tc;
  updateHeader(); renderView();
  showToast('✅ TC guardado');
  scriptPost({accion:'guardarTC',mes,tc}).catch(()=>showToast('⚠️ Error al sincronizar TC'));
}

function cambiarMesComparar(n,v){
  if(n===1) mesComparar1=new Date(v+'-15');
  else mesComparar2=new Date(v+'-15');
  if(currentView==='comparar') renderView();
}

function buscarGastos(){
  const q=document.getElementById('inputBuscar').value.toLowerCase();
  const res=gastos.filter(g=>g.detalle.toLowerCase().includes(q)||g.rubro.toLowerCase().includes(q)||g.subrubro.toLowerCase().includes(q)).sort((a,b)=>{ const fd=b.fecha.localeCompare(a.fecha); if(fd!==0) return fd; const ta=a.id&&a.id.startsWith("GAS-")?parseInt(a.id.split("-")[1]||0):a.idx; const tb=b.id&&b.id.startsWith("GAS-")?parseInt(b.id.split("-")[1]||0):b.idx; return tb-ta; }).slice(0,20);
  const el=document.getElementById('buscarResultados');
  if(!q){el.innerHTML='';return;}
  if(!res.length){el.innerHTML='<div class="empty" style="padding:20px"><div class="empty-text">Sin resultados</div></div>';return;}
  el.innerHTML=res.map(g=>{const em=g.rubro.match(/^\p{Emoji}/u);const icon=em?em[0]:'💸';const rn=g.rubro.replace(/^\p{Emoji}\s*/u,'');const idx=gastos.indexOf(g);return`<div class="gasto-card" onclick="editarGasto(${idx})" style="cursor:pointer"><div class="gasto-icon">${icon}</div><div class="gasto-info"><div class="gasto-rubro">${rn}${g.subrubro?' · '+g.subrubro:''}</div>${g.detalle?'<div class="gasto-detalle">'+g.detalle+'</div>':''}</div><div class="gasto-right"><div class="gasto-monto">$${fmt(g.monto)}</div><div class="gasto-fecha">${g.fecha}</div></div></div>`;}).join('');
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

let gastoEditandoIdx=null;

function editarGasto(i){
  const g=gastos[i];
  if(!g) return;
  gastoEditandoIdx=i;
  document.getElementById('editMonto').value=g.monto;
  document.getElementById('editDetalle').value=g.detalle||'';
  document.getElementById('editFecha').value=g.fecha;
  // Chips rubro
  document.getElementById('editChipsRubro').innerHTML=rubros.map(r=>`<button class="chip ${g.rubro===r.nombre?'active':''}" onclick="editSelectRubro('${r.nombre.replace(/'/g,"\\'")}')">${r.nombre}</button>`).join('');
  // Subrubro
  const r=rubros.find(x=>x.nombre===g.rubro);
  if(r&&r.subs&&r.subs.length){
    document.getElementById('editSubRubroSection').style.display='block';
    document.getElementById('editChipsSubrubro').innerHTML=r.subs.map(s=>`<button class="chip ${g.subrubro===s?'active':''}" onclick="editSelectSub('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
  } else {
    document.getElementById('editSubRubroSection').style.display='none';
  }
  openModal('modalEditar');
}

function editSelectRubro(nombre){
  const g=gastos[gastoEditandoIdx];
  if(g) g.rubro=nombre;
  document.querySelectorAll('#editChipsRubro .chip').forEach(c=>c.classList.toggle('active',c.textContent.trim()===nombre));
  const r=rubros.find(x=>x.nombre===nombre);
  if(r&&r.subs&&r.subs.length){
    document.getElementById('editSubRubroSection').style.display='block';
    document.getElementById('editChipsSubrubro').innerHTML=r.subs.map(s=>`<button class="chip" onclick="editSelectSub('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
    if(g) g.subrubro='';
  } else {
    document.getElementById('editSubRubroSection').style.display='none';
    if(g) g.subrubro='';
  }
}

function editSelectSub(s){
  const g=gastos[gastoEditandoIdx];
  if(g) g.subrubro=s;
  document.querySelectorAll('#editChipsSubrubro .chip').forEach(c=>c.classList.toggle('active',c.textContent.trim()===s));
}

async function guardarEdicion(){
  const g=gastos[gastoEditandoIdx];
  if(!g) return;
  const monto=parseFloat(document.getElementById('editMonto').value);
  if(!monto||monto<=0) return showToast('⚠️ Ingresá un monto válido');
  const detalle=document.getElementById('editDetalle').value.trim();
  const fecha=document.getElementById('editFecha').value;
  const mk=fecha.slice(0,7);
  g.fecha=fecha; g.mes=mk; g.detalle=detalle; g.monto=monto;
  updateHeader(); renderView();
  closeModal('modalEditar');
  showToast('✅ Gasto actualizado');
  // Usar ID si existe, fallback a índice para gastos viejos sin ID
  const payload=g.id
    ? {accion:'actualizar',hoja:'Gastos',id:g.id,valores:[g.id,fecha,mk,g.rubro,g.subrubro||'',detalle,monto,g.tipo]}
    : {accion:'actualizar',hoja:'Gastos',indice:g.idx,valores:[fecha,mk,g.rubro,g.subrubro||'',detalle,monto,g.tipo]};
  scriptPost(payload).catch(()=>showToast('⚠️ Error al sincronizar'));
}

async function eliminarGasto(){
  const g=gastos[gastoEditandoIdx];
  if(!g) return;
  gastos.splice(gastoEditandoIdx,1);
  gastos.forEach((x,i)=>x.idx=i);
  updateHeader(); renderView();
  closeModal('modalEditar');
  showToast('🗑 Gasto eliminado');
  const payload=g.id
    ? {accion:'eliminar',hoja:'Gastos',id:g.id}
    : {accion:'eliminar',hoja:'Gastos',indice:g.idx};
  scriptPost(payload).catch(()=>showToast('⚠️ Error al sincronizar'));
}

document.getElementById('monthBadge').textContent=fmtMes(mesActual);
loadData();

document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o) o.classList.remove('open');});
});

// Fix modal position when virtual keyboard opens/closes
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{
    document.querySelectorAll('.modal-overlay.open').forEach(o=>{
      const offset=window.innerHeight - window.visualViewport.height;
      o.style.bottom = offset + 'px';
      o.style.height = window.visualViewport.height + 'px';
    });
  });
}
</script>
</body>
